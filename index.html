<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { padding:15px; background:#f5f7fa; font-family:system-ui, sans-serif; }

        button {
            width:100%; padding:14px; margin:6px 0;
            border:none; border-radius:10px;
            background:#007aff; color:white; font-size:16px;
        }
        #exportBtn { background:#34c759; }

        .table-container {
            background:white; border-radius:12px; margin-top:10px; overflow-x:auto;
        }
        table { width:100%; border-collapse:collapse; }
        td,th { border:1px solid #e5e5ea; padding:12px; min-width:110px; text-align:left; }

        .goods { background:#f2f2f7; cursor:pointer; }
        .input { background:#fff; outline:none; }
        .result { background:#e8f4ff; font-weight:500; }

        .modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.6); z-index:99;
        }
        .modal-body {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            width:90%; max-width:400px; background:white; padding:20px; border-radius:15px;
            max-height:80vh; overflow-y:auto;
        }
        .item { padding:12px; border-bottom:1px solid #eee; cursor:pointer; }

        #exportResult {
            margin-top:20px; padding:15px; background:white; border-radius:10px;
            white-space:pre-line; line-height:1.6;
        }
    </style>
</head>
<body>

<button id="exportBtn" onclick="exportText()">Export Text</button>
<button onclick="addRow()">Add Row</button>

<div class="table-container">
    <table id="table">
        <tr>
            <th>产品名称</th>
            <th>板材数量</th>
            <th>总数</th>
        </tr>
        <tr>
            <td class="goods" onclick="selectGoods(this)">请选择</td>
            <td class="input" contenteditable oninput="calcAll()">0</td>
            <td class="result">0</td>
        </tr>
    </table>
</div>

<div id="exportResult"></div>

<div class="modal" id="modal">
    <div class="modal-body">
        <div id="goodsList"></div>
        <button onclick="closeModal()" style="background:#888; margin-top:10px;">关闭</button>
    </div>
</div>

<script>
    let products = [];
    window.onload = loadProducts;

    async function loadProducts() {
        const res = await fetch('./products.json');
        products = await res.json();
    }

    async function selectGoods(cell) {
        await loadProducts();
        document.getElementById('modal').style.display = 'block';
        const list = document.getElementById('goodsList');
        list.innerHTML = '';

        products.forEach(p => {
            const div = document.createElement('div');
            div.className = 'item';
            div.textContent = p.name;
            div.onclick = () => {
                cell.textContent = p.name;
                cell.dataset.id = p.id;
                cell.dataset.rate = p.rate;
                cell.dataset.extraId = p.extraId || "";
                cell.dataset.extraNum = p.extraNum || 0;
                calcAll();
                closeModal();
            };
            list.appendChild(div);
        });
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    function getProductById(id) {
        return products.find(p => p.id == id) || null;
    }

    function getProductByName(name) {
        return products.find(p => p.name === name) || null;
    }

    function calcAll() {
        const rows = Array.from(document.querySelectorAll("#table tr")).slice(1);

        // 1. 先给所有商品补齐数据（自动生成的行也会有rate）
        rows.forEach(row => {
            const name = row.cells[0].textContent;
            const p = getProductByName(name);
            if (p) {
                row.cells[0].dataset.id = p.id;
                row.cells[0].dataset.rate = p.rate;
                row.cells[0].dataset.extraId = p.extraId || "";
                row.cells[0].dataset.extraNum = p.extraNum || 0;
            }
        });

        // 2. 计算自身产量
        rows.forEach(row => {
            const rate = parseFloat(row.cells[0].dataset.rate) || 0;
            const num = parseFloat(row.cells[1].textContent) || 0;
            row.cells[2].textContent = (num * rate).toString();
        });

        // 3. 生成额外商品
        rows.forEach(row => {
            const extraId = row.cells[0].dataset.extraId;
            const materialNum = parseFloat(row.cells[1].textContent) || 0;
            if (!extraId || materialNum <= 0) return;

            const target = getProductById(extraId);
            if (!target) return;

            const exists = rows.some(r => r.cells[0].textContent === target.name);
            if (!exists) {
                const table = document.getElementById('table');
                const newRow = table.insertRow();
                newRow.innerHTML = `
            <td class="goods">${target.name}</td>
            <td class="input" contenteditable oninput="calcAll()">0</td>
            <td class="result">0</td>`;
            }
        });

        // 4. 累加赠送数量
        const allRows = Array.from(document.querySelectorAll("#table tr")).slice(1);
        allRows.forEach(row => {
            const name = row.cells[0].textContent;
            let total = parseFloat(row.cells[2].textContent) || 0;

            allRows.forEach(r => {
                const eId = r.cells[0].dataset.extraId;
                const eNum = parseFloat(r.cells[0].dataset.extraNum) || 0;
                const mNum = parseFloat(r.cells[1].textContent) || 0;
                const ep = getProductById(eId);
                if (ep && ep.name === name) {
                    total += mNum * eNum;
                }
            });

            row.cells[2].textContent = total.toString();
        });
    }

    function addRow() {
        const row = document.getElementById('table').insertRow();
        row.innerHTML = `
    <td class="goods" onclick="selectGoods(this)">请选择</td>
    <td class="input" contenteditable oninput="calcAll()">0</td>
    <td class="result">0</td>`;
    }

    function exportText() {
        const date = new Date().toLocaleDateString();
        const rows = document.querySelectorAll("#table tr");
        let txt = '';
        for (let i = 1; i < rows.length; i++) {
            const name = rows[i].cells[0].textContent;
            const c1 = rows[i].cells[1].textContent;
            const c2 = rows[i].cells[2].textContent;
            txt += `${date}，${name} ${c1} ${c2}件\n`;
        }
        document.getElementById('exportResult').textContent = txt;
    }
</script>
</body>
</html>
